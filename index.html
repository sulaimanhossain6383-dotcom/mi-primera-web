<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bienvenido</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #4e73df, #1cc88a);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#welcome {
  text-align: center;
  background: white;
  padding: 40px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

#content {
  display: none;
  text-align: center;
  background: white;
  padding: 40px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

button {
  padding: 10px 20px;
  border: none;
  background: #4e73df;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="welcome">
  <h1>¡Bienvenido!</h1>
  <p>Esta es mi web interactiva 🚀</p>
  <button onclick="entrar()">Entrar</button>
</div>

<div id="content">
  <h1>Contenido</h1>
  <p>Aquí va todo lo importante.</p>
  <button onclick="volver()">Volver</button>
</div>

<script>
function entrar() {
  document.getElementById("welcome").style.display = "none";
  document.getElementById("content").style.display = "block";
}

function volver() {
  document.getElementById("content").style.display = "none";
  document.getElementById("welcome").style.display = "block";
}
</script>

</body>
</html>
