<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>EDITS CAPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #141e30, #243b55);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .box {
      background: rgba(255,255,255,0.08);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      width: 300px;
    }

    button {
      padding: 10px;
      margin-top: 15px;
      border-radius: 20px;
      border: none;
      width: 100%;
      cursor: pointer;
      font-weight: bold;
    }

    .btn {
      background: white;
      color: black;
    }

    #auth, #app {
      display: none;
    }
  </style>
</head>

<body>

  <!-- BIENVENIDA -->
  <div class="box" id="welcome">
    <h1>EDITS CAPS 🚀</h1>
    <button class="btn" onclick="irLogin()">Entrar</button>
  </div>

  <!-- LOGIN -->
  <div class="box" id="auth">
    <h2>Cuenta</h2>
    <input type="text" id="user" placeholder="Usuario"><br><br>
    <input type="password" id="pass" placeholder="Contraseña"><br>
    <button class="btn" onclick="entrar()">Entrar</button>
    <p id="msg"></p>
  </div>

  <!-- APP -->
  <div class="box" id="app">
    <h2 id="saludo"></h2>

    <input type="file" id="videoInput" accept="video/*"><br><br>
    <video id="video" width="250" controls></video><br><br>

    <label>Inicio:</label>
    <input type="number" id="inicio" value="0"><br>

    <label>Fin:</label>
    <input type="number" id="fin" value="5"><br><br>

    <button class="btn" onclick="recortar()">Recortar</button>

    <p id="resultado"></p>

    <button onclick="logout()">Salir</button>
  </div>

  <script>
    function irLogin() {
      document.getElementById("welcome").style.display = "none";
      document.getElementById("auth").style.display = "block";
    }

    function entrar() {
      const user = document.getElementById("user").value;

      if (!user) {
        document.getElementById("msg").innerText = "Escribe usuario";
        return;
      }

      document.getElementById("auth").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("saludo").innerText = "Bienvenido " + user;
    }

    function logout() {
      document.getElementById("app").style.display = "none";
      document.getElementById("welcome").style.display = "block";
    }

    const input = document.getElementById("videoInput");
    const video = document.getElementById("video");

    input.addEventListener("change", function() {
      const file = this.files[0];
      if (file) {
        video.src = URL.createObjectURL(file);
      }
    });

    function recortar() {
      const i = document.getElementById("inicio").value;
      const f = document.getElementById("fin").value;

      document.getElementById("resultado").innerText =
        "Recorte de " + i + "s a " + f + "s (simulado)";
    }
  </script>

</body>
</html>
