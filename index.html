<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDITS CAPS</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .container {
      background: rgba(255,255,255,0.08);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      width: 320px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 20px;
      margin-top: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: white;
      color: #141e30;
    }

    .secondary {
      background: transparent;
      color: white;
      border: 1px solid white;
    }

    #app {
      display: none;
      text-align: center;
    }

    #welcome {
      display: block;
    }
  </style>
</head>
<body>

  <!-- Pantalla de bienvenida -->
  <div class="container" id="welcome">
    <h1>Bienvenido a</h1>
    <h2>EDITS CAPS 🚀</h2>
    <button class="primary" onclick="showAuth()">Entrar</button>
  </div>

  <!-- Login / Registro -->
  <div class="container" id="auth" style="display:none;">
    <h2>Cuenta</h2>
    <input type="text" id="username" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contraseña">
    <button class="primary" onclick="register()">Crear cuenta</button>
    <button class="secondary" onclick="login()">Iniciar sesión</button>
    <p id="mensaje"></p>
  </div>

  <!-- Pantalla de app -->
  <div class="container" id="app" style="display:none;">
    <h2 id="saludo"></h2>
    <p>Bienvenido a EDITS CAPS</p>
    <p>Editor de video en construcción ✂️🎬</p>
    <button class="secondary" onclick="logout()">Cerrar sesión</button>
  </div>

  <script>
    function showAuth() {
      document.getElementById("welcome").style.display = "none";
      document.getElementById("auth").style.display = "block";
    }

    function register() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;

      if (!user || !pass) {
        document.getElementById("mensaje").innerText = "Completa todo";
        return;
      }

      localStorage.setItem("user", user);
      localStorage.setItem("pass", pass);
      document.getElementById("mensaje").innerText = "Cuenta creada ✔";
    }

    function login() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;

      const savedUser = localStorage.getItem("user");
      const savedPass = localStorage.getItem("pass");

      if (user === savedUser && pass === savedPass) {
        document.getElementById("auth").style.display = "none";
        document.getElementById("app").style.display = "block";
        document.getElementById("saludo").innerText = "Bienvenido " + user + " 🔥";
      } else {
        document.getElementById("mensaje").innerText = "Datos incorrectos";
      }
    }

    function logout() {
      document.getElementById("app").style.display = "none";
      document.getElementById("welcome").style.display = "block";
    }
  </script>

</body>
</html>
