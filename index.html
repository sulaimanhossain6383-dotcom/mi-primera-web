<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Web Interactiva</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(135deg, #4e73df, #1cc88a);
}
.container {
  background: white;
  padding: 40px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
  margin-bottom: 10px;
}

#contador {
  font-size: 24px;
  margin: 15px 0;
}

button {
  padding: 10px 20px;
  border: none;
background: #4e73df;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">
  <h1>¡Interacción!</h1>
  <p>Haz clic para sumar</p>
  <div id="contador">0</div>
  <button onclick="sumar()">Sumar +1</button>
</div>

<script>
let contador = 0;function sumar() {
  contador++;
  document.getElementById("contador").textContent = contador;
}
</script>

</body>
</html>
